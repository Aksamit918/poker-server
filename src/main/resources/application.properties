spring.application.name=poker-server

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:poker_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:password}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

poker.jwt.secret=${JWT_SECRET:dev_secret_key_only_for_local_poker_development_32_chars}
poker.jwt.expiration=${JWT_EXPIRATION:15m}
poker.jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:7d}